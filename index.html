<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薪酬結構設計平台</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#f5f6fa; color:#2c3e50; font-size:16px; }
.hidden { display:none !important; }

/* Login */
#login { display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg, #1a237e 0%, #283593 100%); }
.login-box { background:#fff; border-radius:20px; padding:56px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.15); max-width:420px; width:90%; }
.login-box h1 { font-size:26px; letter-spacing:1px; color:#1a237e; margin-bottom:8px; }
.login-box p { color:#888; margin-bottom:28px; font-size:14px; }
.btn-google { display:inline-flex; align-items:center; gap:12px; padding:14px 36px; background:#fff; border:2px solid #e0e0e0; border-radius:10px; font-size:16px; cursor:pointer; transition:.3s; }
.btn-google:hover { border-color:#1a237e; box-shadow:0 4px 12px rgba(26,35,126,.1); }

/* Top Bar */
.topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 0; border-bottom:2px solid #e8eaf6; margin-bottom:24px; }
.topbar h1 { font-size:22px; color:#1a237e; letter-spacing:.5px; }
.topbar h1 small { font-size:14px; color:#90a4ae; font-weight:400; margin-left:10px; }
.user { display:flex; align-items:center; gap:12px; font-size:14px; }
.user img { width:36px; height:36px; border-radius:50%; border:2px solid #e8eaf6; object-fit:cover; }
.user .logout { color:#90a4ae; cursor:pointer; font-size:13px; transition:.2s; }
.user .logout:hover { color:#e74c3c; }

.btn { padding:10px 20px; border-radius:8px; border:1px solid #cfd8dc; background:#fff; font-size:14px; cursor:pointer; transition:.2s; }
.btn:hover { background:#eceff1; }

.actions { display:flex; gap:10px; align-items:center; }

/* Industry Chips */
.chip-row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:24px; }
.chip { padding:10px 24px; border-radius:28px; border:1px solid #cfd8dc; background:#fff; font-size:15px; cursor:pointer; transition:.2s; }
.chip:hover { border-color:#1a237e; color:#1a237e; background:#f5f6fa; }
.chip.active { background:#1a237e; color:#fff; border-color:#1a237e; }

/* Layout */
.row { display:flex; gap:24px; }
.col-left { width:55%; flex-shrink:0; }
.col-right { flex:1; min-width:0; }

/* Dept Cards — PPT style */
.d-card { background:#fff; border-radius:12px; border:1px solid #e8eaf6; margin-bottom:12px; overflow:hidden; transition:.2s; }
.d-card.on { border-color:#1a237e; box-shadow:0 4px 16px rgba(26,35,126,.06); }
.d-card.off { opacity:.6; }
.d-head { display:flex; align-items:center; gap:12px; padding:14px 20px; cursor:pointer; user-select:none; background:#fafbff; }
.d-head input[type="checkbox"] { width:20px;height:20px;accent-color:#1a237e; }
.d-name { font-weight:700; font-size:16px; min-width:80px; color:#1a237e; }
.d-type { font-size:12px; padding:4px 10px; border-radius:6px; white-space:nowrap; font-weight:600; }
.d-type.up { background:#fff3e0; color:#e65100; }
.d-type.flat { background:#e8f5e9; color:#2e7d32; }
.d-type.down { background:#e3f2fd; color:#1565c0; }
.d-body { padding:20px; }

/* Controls row */
.d-controls { display:grid; grid-template-columns:2fr 1fr 1fr 1fr; gap:12px; margin-bottom:16px; }
.d-ctl label { display:block; font-size:12px; color:#90a4ae; margin-bottom:4px; font-weight:500; }
.d-ctl input { width:100%; padding:10px 12px; border:1.5px solid #e0e0e0; border-radius:8px; font-size:16px; font-weight:600; color:#1a237e; transition:.2s; background:#fafbff; }
.d-ctl input:focus { outline:none; border-color:#1a237e; box-shadow:0 0 0 3px rgba(26,35,126,.1); }

/* Preview — two-column PPT split */
.d-preview { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.d-panel { padding:16px; border-radius:10px; min-height:100px; }
.d-panel.fixed { background:linear-gradient(135deg, #e8eaf6 0%, #f5f6fa 100%); border:1px solid #c5cae9; }
.d-panel.float { background:linear-gradient(135deg, #fff8e1 0%, #fffde7 100%); border:1px solid #ffe082; }
.d-panel-title { font-size:13px; font-weight:700; color:#1a237e; margin-bottom:2px; letter-spacing:1px; }
.d-panel-amt { font-size:22px; font-weight:700; color:#1a237e; margin-bottom:8px; }
.d-panel-amt small { font-size:13px; font-weight:400; color:#78909c; margin-left:6px; }
.d-panel-rows { font-size:14px; color:#546e7a; line-height:1.8; }
.d-panel-rows > div { display:flex; justify-content:space-between; align-items:center; }
.d-panel-rows .subj { color:#78909c; font-size:13px; display:block; line-height:1.6; margin-top:2px; }

/* Extra */
.d-extra { display:flex; gap:8px; flex-wrap:wrap; }
.d-extra-item { padding:8px 14px; border-radius:8px; font-size:13px; line-height:1.5; flex:1; min-width:140px; }
.d-extra-item.bonus { background:#fff3e0; border:1px solid #ffe0b2; color:#e65100; }
.d-extra-item.welfare { background:#e8f5e9; border:1px solid #c8e6c9; color:#2e7d32; }
.d-extra-item.risk { background:#fce4ec; border:1px solid #f8bbd0; color:#c62828; }

/* Summary */
.summary { margin-top:16px; }
.stbl { width:100%; border-collapse:collapse; font-size:14px; }
.stbl th { background:#fafbff; padding:12px 10px; text-align:left; font-weight:600; border-bottom:2px solid #e8eaf6; color:#1a237e; font-size:13px; }
.stbl td { padding:10px; border-bottom:1px solid #e8eaf6; }
.stbl tbody tr:hover td { background:#fafbff; }
.stbl .r { text-align:right; }
.stbl .t-up td { background:#fffdf5; border-left:3px solid #e65100; }
.stbl .t-flat td { border-left:3px solid #2e7d32; }
.stbl .t-down td { border-left:3px solid #1565c0; }
.stbl .t-total td { font-weight:700; border-top:2px solid #1a237e; background:#fafbff; color:#1a237e; font-size:15px; }

.bm { background:#e8eaf6; border-radius:8px; padding:12px 16px; font-size:14px; color:#1a237e; margin-top:12px; border-left:4px solid #1a237e; }
.empty { text-align:center; color:#b0bec5; padding:60px 0; font-size:16px; }

/* Scroll */
.left-scroll { max-height:calc(100vh - 160px); overflow-y:auto; padding-right:8px; }
.left-scroll::-webkit-scrollbar { width:6px; }
.left-scroll::-webkit-scrollbar-track { background:transparent; }
.left-scroll::-webkit-scrollbar-thumb { background:#cfd8dc; border-radius:3px; }

/* Responsive */
@media (max-width:1100px) {
  .row { flex-direction:column; }
  .col-left { width:100%; }
  .left-scroll { max-height:none; }
}

@media print {
  .topbar .actions, .chip-row, .d-head input, .btn, .user .logout { display:none !important; }
  .d-card { break-inside:avoid; border:1px solid #ddd; }
  body { background:#fff; }
  #app { max-width:100%; padding:0; }
}
</style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="login-box">
    <h1>薪酬結構設計平台</h1>
    <p>11 部門 × 三種職務形狀 · 科目拆解 · 產業對照</p>
    <button class="btn-google" onclick="window.signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      使用 Google 登入
    </button>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <div class="topbar">
    <h1>薪酬結構設計平台 <small>11 部門 × 三種職務形狀</small></h1>
    <div class="actions">
      <button class="btn" onclick="window.exportCSV()">📥 CSV</button>
      <button class="btn" onclick="window.exportPDF()">🖨️ PDF</button>
      <div class="user">
        <img id="userAvatar" src="">
        <span id="userName"></span>
        <span class="logout" onclick="window.signOut()">登出</span>
      </div>
    </div>
  </div>

  <div class="chip-row" id="industryChips"></div>

  <div class="row">
    <div class="col-left">
      <div class="left-scroll" id="deptCards"></div>
    </div>
    <div class="col-right">
      <div id="summaryContent" class="summary"><div class="empty">勾選部門後這裡會顯示彙總</div></div>
      <div id="benchmark"></div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
