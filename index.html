<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薪酬結構設計平台 v1</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f8f9fc; color:#1e293b; font-size:15px; -webkit-font-smoothing:antialiased; }
.hidden { display:none !important; }

/* Login */
#login { display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
.login-box { background:#fff; border-radius:16px; padding:48px 56px; text-align:center; box-shadow:0 25px 50px -12px rgba(0,0,0,.25); max-width:400px; width:90%; }
.login-box h1 { font-size:24px; font-weight:700; color:#0f172a; margin-bottom:4px; letter-spacing:-.3px; }
.login-box p { color:#64748b; margin-bottom:24px; font-size:14px; }
.btn-google { display:inline-flex; align-items:center; gap:10px; padding:12px 32px; background:#fff; border:1.5px solid #e2e8f0; border-radius:8px; font-size:15px; font-weight:500; cursor:pointer; transition:.2s; color:#334155; }
.btn-google:hover { border-color:#6366f1; color:#6366f1; box-shadow:0 4px 12px rgba(99,102,241,.08); }

/* App Shell */
#app { max-width:1600px; margin:0 auto; padding:0 32px; }

/* Top Bar */
.topbar { display:flex; align-items:center; justify-content:space-between; padding:20px 0; border-bottom:1px solid #e2e8f0; margin-bottom:24px; }
.topbar h1 { font-size:18px; font-weight:700; color:#0f172a; letter-spacing:-.3px; }
.topbar h1 small { font-size:12px; color:#94a3b8; font-weight:400; margin-left:8px; }
.actions { display:flex; gap:10px; align-items:center; }
.user { display:flex; align-items:center; gap:10px; font-size:13px; color:#64748b; }
.user img { width:30px; height:30px; border-radius:50%; border:1.5px solid #e2e8f0; }
.user .logout { color:#94a3b8; cursor:pointer; font-size:12px; transition:.15s; }
.user .logout:hover { color:#ef4444; }
.btn { padding:8px 16px; border-radius:6px; border:1px solid #e2e8f0; background:#fff; font-size:13px; font-weight:500; cursor:pointer; transition:.15s; color:#475569; }
.btn:hover { background:#f8fafc; border-color:#cbd5e1; }
.btn-primary { padding:10px 24px; border-radius:6px; border:none; background:#0f172a; color:#fff; font-size:13px; font-weight:600; cursor:pointer; transition:.15s; letter-spacing:.3px; }
.btn-primary:hover { background:#1e293b; }
.btn-primary:disabled { opacity:.35; cursor:default; }

/* Industry chips */
.chip-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
.chip { padding:8px 20px; border-radius:20px; border:1px solid #e2e8f0; background:#fff; font-size:13px; font-weight:500; cursor:pointer; transition:.15s; color:#475569; }
.chip:hover { border-color:#6366f1; color:#6366f1; background:#f8fafc; }
.chip.active { background:#0f172a; color:#fff; border-color:#0f172a; }

/* Step Indicator */
.steps { display:flex; align-items:center; gap:0; margin-bottom:24px; background:#fff; border-radius:10px; padding:16px 24px; border:1px solid #e2e8f0; }
.step { display:flex; align-items:center; gap:10px; flex:1; position:relative; }
.step-num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; transition:.2s; }
.step.active .step-num { background:#0f172a; color:#fff; }
.step.done .step-num { background:#059669; color:#fff; }
.step.pending .step-num { background:#f1f5f9; color:#94a3b8; }
.step-label { font-size:13px; font-weight:600; transition:.2s; }
.step.active .step-label { color:#0f172a; }
.step.done .step-label { color:#059669; }
.step.pending .step-label { color:#94a3b8; }
.step-arrow { color:#e2e8f0; font-size:20px; margin:0 4px; font-weight:300; }

/* Main Layout */
.main { display:flex; gap:24px; min-height:calc(100vh - 200px); }
.content { flex:1; min-width:0; }
.sidebar { width:340px; flex-shrink:0; }

/* Sidebar - Budget Overview */
.sbo { background:#fff; border-radius:10px; border:1px solid #e2e8f0; padding:20px; position:sticky; top:16px; }
.sbo-title { font-size:14px; font-weight:700; color:#0f172a; margin-bottom:16px; letter-spacing:-.2px; }
.sbo-row { display:flex; justify-content:space-between; padding:8px 0; font-size:13px; border-bottom:1px solid #f8fafc; }
.sbo-row .sbo-lbl { color:#64748b; }
.sbo-row .sbo-val { font-weight:600; color:#0f172a; font-variant-numeric:tabular-nums; }
.sbo-bar { height:8px; background:#f1f5f9; border-radius:4px; margin:12px 0 4px; overflow:hidden; }
.sbo-bar-fill { height:100%; border-radius:4px; transition:width .3s; }
.sbo-bar-fill.good { background:#10b981; }
.sbo-bar-fill.warn { background:#f59e0b; }
.sbo-bar-fill.danger { background:#ef4444; }
.sbo-bar-label { font-size:11px; color:#94a3b8; text-align:right; margin-bottom:8px; }
.sbo-health { padding:10px 14px; border-radius:6px; font-size:12px; font-weight:600; margin-top:12px; line-height:1.5; }

/* Print */
@media print { .sidebar,.steps,.chip-row,.step-nav,.actions,.user .logout,.footer { display:none!important; } body { background:#fff; color:#000; } #app { max-width:100%; padding:0; } .scard { break-inside:avoid; border:1px solid #ddd; } }

/* Responsive */
@media (max-width:1100px) { .main { flex-direction:column; } .sidebar { width:100%; } }
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h1>薪酬結構設計平台</h1>
    <p>v1 · 流程引導 · 總預算→部門→結構</p>
    <button class="btn-google" onclick="window.signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      使用 Google 登入
    </button>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <h1>薪酬結構設計平台 <small>v1 · 總預算 → 部門配置 → 結構設計</small></h1>
    <div class="actions">
      <button class="btn" onclick="window.exportCSV()">📥 CSV</button>
      <button class="btn" onclick="window.exportPDF()">🖨️ PDF</button>
      <div class="user">
        <img id="userAvatar" src="">
        <span id="userName"></span>
        <span class="logout" onclick="window.signOut()">登出</span>
      </div>
    </div>
  </div>

  <div class="chip-row" id="industryChips"></div>

  <!-- Step Indicator -->
  <div class="steps" id="stepIndicator"></div>

  <!-- Main -->
  <div class="main">
    <div class="content" id="stepContent"></div>
    <div class="sidebar">
      <div class="sbo" id="sidebarOverview"></div>
    </div>
  </div>
</div>

<div class="footer">© 2026 <strong>睿謙事業有限公司（RCBC）</strong> — 薪酬結構設計平台 v1</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
