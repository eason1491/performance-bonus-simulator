<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薪酬結構設計平台</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#f0f2f5; color:#1a1a2e; font-size:14px; }
.hidden { display:none !important; }

/* Login */
#login { display:flex; align-items:center; justify-content:center; min-height:100vh; }
.login-box { background:#fff; border-radius:16px; padding:48px; text-align:center; box-shadow:0 4px 24px rgba(0,0,0,.06); max-width:400px; width:90%; }
.login-box h1 { font-size:22px; margin-bottom:6px; }
.login-box p { color:#888; margin-bottom:24px; font-size:13px; }
.btn-google { display:inline-flex; align-items:center; gap:10px; padding:12px 32px; background:#fff; border:1px solid #ddd; border-radius:8px; font-size:15px; cursor:pointer; transition:.2s; }
.btn-google:hover { background:#f5f5f5; }

/* App */
#app { max-width:1280px; margin:0 auto; padding:0 16px; }

/* Top Bar */
.topbar { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid #e0e0e0; margin-bottom:16px; }
.topbar h1 { font-size:18px; color:#1a1a2e; }
.topbar h1 small { font-size:12px; color:#888; font-weight:400; margin-left:8px; }
.user { display:flex; align-items:center; gap:8px; font-size:13px; }
.user img { width:28px; height:28px; border-radius:50%; object-fit:cover; }
.user .logout { color:#999; cursor:pointer; font-size:12px; }
.user .logout:hover { color:#e74c3c; }

.btn { padding:6px 14px; border-radius:6px; border:1px solid #ddd; background:#fff; font-size:12px; cursor:pointer; transition:.2s; }
.btn:hover { background:#f5f5f5; }
.btn-pri { padding:6px 16px; border-radius:6px; border:none; background:#4361ee; color:#fff; font-size:12px; cursor:pointer; }
.btn-pri:hover { background:#3a56d4; }

.actions { display:flex; gap:6px; }

/* Industry Chips */
.chip-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
.chip { padding:6px 16px; border-radius:20px; border:1px solid #d0d0d0; background:#fff; font-size:13px; cursor:pointer; transition:.2s; }
.chip:hover { border-color:#4361ee; color:#4361ee; }
.chip.active { background:#4361ee; color:#fff; border-color:#4361ee; }

/* Layout */
.row { display:flex; gap:16px; }
.col-left { width:380px; flex-shrink:0; }
.col-right { flex:1; min-width:0; }

/* Dept Cards */
.d-card { background:#fff; border-radius:8px; border:1px solid #e0e0e0; margin-bottom:8px; overflow:hidden; transition:.2s; }
.d-card.on { border-color:#4361ee; }
.d-card.off { opacity:.65; }
.d-head { display:flex; align-items:center; gap:8px; padding:10px 14px; cursor:pointer; user-select:none; }
.d-head input { width:16px;height:16px;accent-color:#4361ee; }
.d-name { font-weight:600; font-size:13px; min-width:70px; }
.d-type { font-size:10px; padding:2px 6px; border-radius:4px; white-space:nowrap; }
.d-type.up { background:#fff0e0; color:#d35400; }
.d-type.flat { background:#e8f5e9; color:#27ae60; }
.d-type.down { background:#e3f2fd; color:#2980b9; }
.d-desc { font-size:11px; color:#888; flex:1; }
.d-one { font-size:11px; color:#999; max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.d-body { padding:0 14px 14px; }
.d-row { display:flex; gap:16px; margin-bottom:10px; }
.d-field { min-width:140px; }
.d-field label { font-size:11px; color:#888; display:block; margin-bottom:2px; }
.d-field input { width:100%; padding:6px 8px; border:1px solid #ddd; border-radius:5px; font-size:13px; }
.d-ratios { display:flex; gap:16px; flex:1; }
.d-ratio { background:#f8f9fa; padding:6px 10px; border-radius:6px; flex:1; text-align:center; }
.d-ratio label { font-size:11px; color:#888; display:block; }
.d-ratio span { font-size:13px; font-weight:600; color:#4361ee; }
.d-ratio .sub { font-size:11px; color:#999; font-weight:400; display:block; }
.d-subj { display:flex; flex-wrap:wrap; gap:6px; }
.d-subj-group { background:#fafbfc; border-radius:6px; padding:6px 10px; font-size:11px; color:#555; }
.d-subj-group strong { display:block; font-size:10px; color:#888; margin-bottom:2px; }
.d-subj-group span { display:inline-block; margin-right:4px; }
.d-subj-group span:after { content:'·'; color:#ccc; margin-left:4px; }
.d-subj-group span:last-child:after { content:''; }

/* Summary */
.summary { margin-top:16px; }
.stbl { width:100%; border-collapse:collapse; font-size:12px; }
.stbl th { background:#f5f7fa; padding:8px 6px; text-align:left; font-weight:600; border-bottom:2px solid #ddd; font-size:11px; }
.stbl td { padding:6px; border-bottom:1px solid #eee; }
.stbl tbody tr:hover td { background:#fafbff; }
.stbl .r { text-align:right; }
.stbl .t-up td { border-left:3px solid #e67e22; }
.stbl .t-flat td { border-left:3px solid #27ae60; }
.stbl .t-down td { border-left:3px solid #2980b9; }
.stbl .t-total td { font-weight:600; border-top:2px solid #ddd; background:#f5f7fa; }

.bm { background:#e8f0ff; border-radius:6px; padding:8px 12px; font-size:12px; color:#4361ee; margin-top:8px; }
.empty { text-align:center; color:#aaa; padding:40px 0; font-size:13px; }

/* Scroll */
.left-scroll { max-height:calc(100vh - 140px); overflow-y:auto; padding-right:4px; }

/* Responsive */
@media (max-width:900px) {
  .row { flex-direction:column; }
  .col-left { width:100%; }
  .left-scroll { max-height:none; }
  .d-one { display:none; }
  .d-desc { display:none; }
}

@media print {
  .topbar .actions, .chip-row, .d-head input, .btn, .user .logout { display:none !important; }
  .d-card { break-inside:avoid; border:1px solid #ddd; }
  body { background:#fff; }
  #app { max-width:100%; padding:0; }
}
</style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="login-box">
    <h1>薪酬結構設計平台</h1>
    <p>11 部門 × 三種職務形狀 · 科目拆解 · 產業對照</p>
    <button class="btn-google" onclick="window.signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      使用 Google 登入
    </button>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <div class="topbar">
    <h1>薪酬結構設計平台 <small>11 部門 × 三種職務形狀</small></h1>
    <div class="actions">
      <button class="btn" onclick="window.exportCSV()">📥 CSV</button>
      <button class="btn" onclick="window.exportPDF()">🖨️ PDF</button>
      <div class="user">
        <img id="userAvatar" src="">
        <span id="userName"></span>
        <span class="logout" onclick="window.signOut()">登出</span>
      </div>
    </div>
  </div>

  <div class="chip-row" id="industryChips"></div>

  <div class="row">
    <div class="col-left">
      <div class="left-scroll" id="deptCards"></div>
    </div>
    <div class="col-right">
      <div id="summaryContent" class="summary"><div class="empty">勾選部門後這裡會顯示彙總</div></div>
      <div id="benchmark"></div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
