<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薪酬結構設計平台 - 11部門 × 三種職務形狀</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; font-size: 14px; }
.hidden { display: none !important; }

/* Login */
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-card { background: #fff; border-radius: 16px; padding: 48px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,.08); max-width: 400px; }
.login-card h1 { font-size: 24px; margin-bottom: 8px; }
.login-card p { color: #888; margin-bottom: 24px; }
.btn-google { display: inline-flex; align-items: center; gap: 10px; padding: 12px 32px; background: #fff; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; cursor: pointer; }
.btn-google:hover { background: #f8f8f8; }

/* App Layout */
#app { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar { width: 260px; background: #1a1a2e; color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,.1); }
.sidebar-header h2 { font-size: 15px; }
.sidebar-header .sub { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 2px; }
.sidebar-user { padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,.1); display: flex; align-items: center; gap: 10px; font-size: 12px; }
.sidebar-user img { width: 28px; height: 28px; border-radius: 50%; }
.sidebar-user .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-user .logout { color: rgba(255,255,255,.4); cursor: pointer; font-size: 11px; }
.sidebar-user .logout:hover { color: #fff; }
.plan-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.plan-item { padding: 10px 20px; cursor: pointer; border-left: 3px solid transparent; font-size: 13px; }
.plan-item:hover { background: rgba(255,255,255,.05); }
.plan-item.active { background: rgba(255,255,255,.1); border-left-color: #4361ee; }
.plan-item .plan-name { font-weight: 500; }
.plan-item .plan-date { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 2px; }
.sidebar-footer { padding: 12px 20px; border-top: 1px solid rgba(255,255,255,.1); }
.btn-new { width: 100%; padding: 8px; background: #4361ee; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
.btn-new:hover { background: #3a56d4; }

/* Main content */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { display: flex; align-items: center; justify-content: flex-end; gap: 12px; padding: 10px 20px; background: #fff; border-bottom: 1px solid #eee; }
.user-info { display:flex; align-items:center; gap:8px; font-size:13px; }
.user-info .avatar { width:28px;height:28px;border-radius:50%;object-fit:cover; }
.btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-size: 12px; cursor: pointer; }
.btn:hover { background: #f8f8f8; }
.btn-primary { background: #4361ee; color: #fff; border-color: #4361ee; }
.btn-primary:hover { background: #3a56d4; }
.btn-danger { background: #e74c3c; color: #fff; border-color: #e74c3c; }
.btn-danger:hover { background: #c0392b; }

.content { flex: 1; overflow-y: auto; padding: 20px; }
.row { display: flex; gap: 20px; flex-wrap: wrap; }
.col { flex: 1; min-width: 320px; }
.card { background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.card h3 { font-size: 14px; margin-bottom: 12px; color: #1a1a2e; padding-bottom: 6px; border-bottom: 1px solid #eee; }

/* Step indicator */
.step-indicator { display:flex; gap:0; margin:16px 0; background:#f0f2f5; border-radius:8px; overflow:hidden; }
.step { flex:1; text-align:center; padding:10px; font-size:13px; color:#999; cursor:pointer; transition:all .2s; }
.step.active { background:#4361ee; color:#fff; font-weight:600; }
.step.done { background:#e8edff; color:#4361ee; }
.step-content { animation: fadeIn .25s; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.industry-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; }
.industry-card { padding:20px; border:2px solid #e0e0e0; border-radius:10px; cursor:pointer; text-align:center; transition:all .2s; background:#fff; }
.industry-card:hover { border-color:#4361ee; transform:translateY(-2px); box-shadow:0 4px 12px rgba(67,97,238,.12); }
.industry-card.selected { border-color:#4361ee; background:#eef1ff; }
.industry-card .name { font-size:15px; font-weight:600; margin-bottom:4px; }
.industry-card .count { font-size:12px; color:#888; }
.dept-checklist { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:10px; }
.dept-check-item { display:flex; align-items:center; gap:10px; padding:14px; border:2px solid #e0e0e0; border-radius:8px; cursor:pointer; transition:all .2s; background:#fff; }
.dept-check-item:hover { border-color:#4361ee; }
.dept-check-item.checked { border-color:#4361ee; background:#eef1ff; }
.dept-check-item input[type="checkbox"] { width:18px;height:18px;accent-color:#4361ee; }
.dept-check-item .dtype { font-size:11px; padding:2px 6px; border-radius:4px; margin-left:auto; white-space:nowrap; }
.dtype.up { background:#fff0e0; color:#e67e22; }
.dtype.flat { background:#e8f5e9; color:#2e7d32; }
.dtype.down { background:#e3f2fd; color:#1565c0; }
.dept-config { border:2px solid #e0e0e0; border-radius:10px; padding:16px; margin-bottom:12px; background:#fff; }
.dept-config .dh { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.dept-config .dh h3 { margin:0; font-size:15px; border:none; padding:0; }
.dept-config .dh .tag { font-size:11px; padding:2px 8px; border-radius:4px; }
.dept-config .sliders { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:12px; }
.dept-config .sliders label { font-size:12px; color:#666; display:block; margin-bottom:2px; }
.dept-config .sliders input[type="range"] { width:100%; margin:4px 0; }
.dept-config .sliders .val { font-size:13px; font-weight:600; color:#4361ee; }
.dept-config .subj { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; font-size:12px; color:#555; }
.dept-config .subj ul { margin:4px 0 0 0; padding-left:16px; }
.dept-config .subj li { margin-bottom:2px; }
.overview-table { width:100%; border-collapse:collapse; font-size:13px; }
.overview-table th { background:#f5f7fa; padding:10px 8px; text-align:left; font-weight:600; border-bottom:2px solid #ddd; }
.overview-table td { padding:8px; border-bottom:1px solid #eee; }
.overview-table tr:hover td { background:#fafbff; }
.overview-table .total td { font-weight:600; border-top:2px solid #ddd; background:#f5f7fa; }
.overview-table .type-up td { border-left:3px solid #e67e22; }
.overview-table .type-flat td { border-left:3px solid #2e7d32; }
.overview-table .type-down td { border-left:3px solid #1565c0; }
.overview-table .r { text-align:right; }
.overview-table .c { text-align:center; }

.form-group { margin-bottom: 8px; }
.form-group label { display: block; font-size: 11px; color: #888; margin-bottom: 2px; }
.form-group input, .form-group select { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 13px; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #4361ee; }
.form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.form-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.form-row4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }
.form-inline { display: flex; align-items: center; gap: 6px; }
.form-inline label { margin-bottom: 0; white-space: nowrap; }
.toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.toggle input[type="checkbox"] { width: auto; }

/* Step table */
.step-table { width: 100%; border-collapse: collapse; margin: 4px 0; }
.step-table th { text-align: left; font-size: 11px; color: #888; padding: 3px 6px; border-bottom: 1px solid #ddd; font-weight: 500; }
.step-table td { padding: 3px 4px; vertical-align: middle; }
.step-table input { width: 70px; padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
.step-table input:focus { outline: none; border-color: #4361ee; }
.btn-sm { padding: 3px 8px; background: #e74c3c; color: #fff; border: none; border-radius: 3px; font-size: 11px; cursor: pointer; }
.btn-sm:hover { background: #c0392b; }
.btn-add { padding: 4px 12px; background: #27ae60; color: #fff; border: none; border-radius: 3px; font-size: 11px; cursor: pointer; margin-top: 4px; }
.btn-add:hover { background: #219a52; }

/* Clawback table */
.cb-table { width: 100%; border-collapse: collapse; margin: 4px 0; }
.cb-table th { text-align: left; font-size: 11px; color: #888; padding: 3px 6px; border-bottom: 1px solid #ddd; font-weight: 500; }
.cb-table td { padding: 3px 4px; vertical-align: middle; }
.cb-table input { width: 60px; padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
.cb-table input:focus { outline: none; border-color: #4361ee; }

/* Results */
.result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 6px; margin: 8px 0; }
.result-item { background: #f8f9fa; border-radius: 8px; padding: 10px; text-align: center; }
.result-item .label { font-size: 10px; color: #888; }
.result-item .value { font-size: 16px; font-weight: 700; margin-top: 2px; }
.result-item.highlight { background: #4361ee; color: #fff; }
.result-item.highlight .label { color: rgba(255,255,255,.7); }
.result-item.danger { background: #e74c3c; color: #fff; }
.result-item.danger .label { color: rgba(255,255,255,.7); }
.result-item.success { background: #27ae60; color: #fff; }
.result-item.success .label { color: rgba(255,255,255,.7); }
.result-item.gold { background: #f39c12; color: #fff; }
.result-item.gold .label { color: rgba(255,255,255,.7); }
.btable { width: 100%; border-collapse: collapse; font-size: 12px; margin: 6px 0; }
.btable th { text-align: left; font-size: 11px; color: #888; padding: 4px 8px; border-bottom: 2px solid #eee; font-weight: 500; }
.btable td { padding: 5px 8px; border-bottom: 1px solid #eee; }
.btable .r { text-align: right; }
.btable .total-row { background: #eef2ff; font-weight: 600; }
.btable .deduction-row { background: #fff5f5; color: #e74c3c; }
.btable .accelerate-row { background: #e8f8f0; }
.btable .decelerate-row { background: #fff8e1; }
.btable .cap-row { background: #fff0e0; color: #e67e22; }
.health-meter { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0; }
.health-item { flex: 1; min-width: 120px; padding: 8px; border-radius: 6px; text-align: center; font-size: 12px; }
.health-item .val { font-size: 16px; font-weight: 700; }
.success-box { background: #e8f8f0; border-left: 3px solid #27ae60; padding: 10px; border-radius: 6px; margin: 6px 0; font-size: 12px; }
.danger-box { background: #fff0f0; border-left: 3px solid #e74c3c; padding: 10px; border-radius: 6px; margin: 6px 0; font-size: 12px; }
.warning-box { background: #fff8e1; border-left: 3px solid #ffc107; padding: 10px; border-radius: 6px; margin: 6px 0; font-size: 12px; }
.info-box { background: #e8f0ff; border-left: 3px solid #4361ee; padding: 10px; border-radius: 6px; margin: 6px 0; font-size: 12px; }

/* Comparison Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal { background: #fff; border-radius: 12px; width: 90%; max-width: 1000px; max-height: 85vh; overflow-y: auto; padding: 24px; }
.modal h2 { font-size: 16px; margin-bottom: 16px; }
.modal-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: #888; }
.compare-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
.compare-card { background: #f8f9fa; border-radius: 8px; padding: 14px; }
.compare-card h4 { font-size: 13px; margin-bottom: 8px; }
.compare-card .stat { padding: 4px 0; display: flex; justify-content: space-between; font-size: 12px; border-bottom: 1px solid #eee; }
.compare-card .stat .v { font-weight: 600; }
.compare-card .best { background: #e8f8f0; margin: 0 -14px; padding: 4px 14px; }

/* Print */
@media print {
  .sidebar, .topbar, .btn, .btn-sm, .btn-add, .modal-overlay { display: none !important; }
  body { padding: 0; background: #fff; }
  .content { overflow: visible; padding: 0; }
  .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
}

@media (max-width: 768px) {
  .sidebar { width: 200px; }
  .col { min-width: 100%; }
  .form-row3, .form-row4 { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- ====== Login Screen ====== -->
<div id="login-screen">
  <div class="login-card">
    <h1>薪酬結構設計平台</h1>
    <p>11 部門 × 三種職務形狀 · 科目拆解 · 比例建議 · 產業對照</p>
    <button class="btn-google" onclick="window.signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      使用 Google 登入
    </button>
  </div>
</div>

<!-- ====== App Shell ====== -->
<div id="app" class="hidden">
  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="user-info">
        <img id="userAvatar" src="" alt="" class="avatar">
        <span id="userName"></span>
        <button class="btn" onclick="window.signOut()" style="font-size:12px;">登出</button>
      </div>
    </div>
    <!-- Steps -->
    <div class="step-indicator" id="stepIndicator">
      <div class="step active" data-step="1">① 選產業</div>
      <div class="step" data-step="2">② 選部門</div>
      <div class="step" data-step="3">③ 設薪酬</div>
      <div class="step" data-step="4">④ 總覽</div>
    </div>
    <!-- Step 1: Industry -->
    <div id="step1" class="step-content">
      <h2>選擇產業</h2>
      <p style="color:#666;margin-bottom:16px;">選擇你公司所屬的產業，系統會自動帶入對應的部門與薪酬建議</p>
      <div id="industryGrid" class="industry-grid"></div>
    </div>
    <!-- Step 2: Departments -->
    <div id="step2" class="step-content hidden">
      <h2>勾選部門</h2>
      <p style="color:#666;margin-bottom:16px;">勾選你的公司有哪些部門，系統會根據職務形狀給出建議比例</p>
      <div id="deptChecklist" class="dept-checklist"></div>
      <div style="margin-top:20px;display:flex;gap:8px;justify-content:space-between;">
        <button class="btn" onclick="window.goStep(1)">← 上一步</button>
        <button class="btn-primary" onclick="window.goStep(3)">下一步 →</button>
      </div>
    </div>
    <!-- Step 3: Configure -->
    <div id="step3" class="step-content hidden">
      <h2>設定薪酬結構</h2>
      <p style="color:#666;margin-bottom:16px;">為每個部門設定年薪總包與比例，可依實際情況微調</p>
      <div id="deptConfigList"></div>
      <div style="margin-top:20px;display:flex;gap:8px;justify-content:space-between;">
        <button class="btn" onclick="window.goStep(2)">← 上一步</button>
        <button class="btn-primary" onclick="window.goStep(4)">下一步 →</button>
      </div>
    </div>
    <!-- Step 4: Overview -->
    <div id="step4" class="step-content hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="margin:0;">薪酬總覽</h2>
        <div style="display:flex;gap:8px;">
          <button class="btn" onclick="window.exportCSV()">📥 CSV</button>
          <button class="btn" onclick="window.exportPDF()">🖨️ PDF</button>
        </div>
      </div>
      <div id="overviewContent"></div>
      <div style="margin-top:20px;display:flex;gap:8px;justify-content:space-between;">
        <button class="btn" onclick="window.goStep(3)">← 上一步</button>
        <button class="btn" onclick="window.goStep(1)">🔄 重新開始</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>

<!-- Tutorial Overlay -->
<div id="tutorialOverlay" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:14px;padding:32px;max-width:460px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.2);position:relative;">
    <div style="font-size:12px;color:#888;margin-bottom:8px;" id="tutorialStep">步驟 1 / 5</div>
    <div style="font-size:18px;font-weight:600;margin-bottom:8px;" id="tutorialTitle">歡迎使用獎金模擬器</div>
    <div style="font-size:14px;color:#555;line-height:1.6;margin-bottom:20px;min-height:60px;" id="tutorialDesc"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <button class="btn" id="tutorialSkip" style="font-size:13px;">跳過</button>
      <div style="display:flex;gap:8px;">
        <button class="btn" id="tutorialPrev" style="font-size:13px;display:none;">上一步</button>
        <button class="btn-primary" id="tutorialNext" style="font-size:13px;padding:8px 20px;">下一步</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
